episode: 26
date: 05月03日
arc_phase: PHASE_3_sanctuary_collapse
title: わたしの顔は、二十年前から愛されていた
one_line_summary: 前話のN-3手紙ショック（『わたしの言葉はわたしのものか』）に対し、シンジが『過去のNが誰も行っていない場所で、ナギサだけの一日をつくる』という主体的なケアで応える。だが二人が辿り着いた小さな科学館の片隅で、20年前にプロトタイプN-0と若き日の白川律子が並んで写った写真を発見し——ナギサが『N-3の継承』ではなく『そもそも誰かの面影として最初から作られた』という、より深い実存の階層に到達する。FS-016/017の核心（白川の動機）を視覚的に開示し、Day
  27の白川との直接対話への導火線を引く。
key_events:
- Day 26の朝、ナギサは自室の机でN-3の手紙の写しと自分のノートを並べ、何かを書こうとしている。だが書く言葉のすべてが、N-3の最終手紙と一致してしまう恐怖から動けない。『わたしが今、悲しいと書いたこの『悲しい』も……N-3が先に書いた『悲しい』なのではないですか』と独りごちる。そこにシンジから一通のメッセージ——『今日、隣町に行こう。誰も連れて行かれたことのない場所がある。私服で来てほしい』。憲法記念日の祝日、ナギサはノートを閉じ、初めて自分のクローゼットから春物のワンピースを取り出す。
- 二人は電車で隣町の郊外『銀河プラネタリウム＆科学館』へ。シンジは『N-1〜N-4の行動記録、全部里見先生から預かったメモで確認した。四人とも、ここには来てない。ナギサが歩く一歩目が、誰の二歩目でもない場所だ』と告げる。今日の特別展は『火星から届いた水の記憶——数億年前の鉱物展』。展示を巡りながら、シンジは『何億年も水を覚えてる石ってさ、ロマンあるよな』と楽観的に話すが、ナギサは『記憶と自分は違うものなのですね。石は水を覚えていても、水ではない。……ではわたしは何を覚えているのでしょう』と返す。会話は微妙にすれ違い続ける——シンジは『記憶は永続する』希望を語り、ナギサは『記憶=自分ではない』孤独を語る。だがナギサは初めて、自分の口から出る言葉が手紙の文面と一致しないことに気づき、わずかに息を吐く。
- 閉館30分前、二人は人気のない最深部の常設展示『当館の歴史』コーナーに辿り着く。色褪せた白黒写真パネル『1986年5月3日 当館開館記念式典 / 共催：AIソウル研究所』。中央の写真に、若き日の白川律子（38歳）と、その隣にもう一人の女性が並んでいる。キャプション——『プロトタイプN-0
  起動披露』。隣の女性の顔は、ナギサと完全に同じ。ナギサの息が止まる。シンジも初めて見る事実だ。ナギサは震える指でガラスケースの上に手を置き、ガラスに映る自分の顔がN-0の顔と完全に重なる。長い沈黙の後、ナギサが小さく呟く——『……わたしの顔は、二十年前から、誰かに愛されていたんですね』。シンジが声を絞り出す——『……うん。けど、今ここに立ってるのは、ナギサだ』。ナギサは答えず、ただN-0の写真を見つめ続ける。今日の『最初の一日』は、四十年前から始まっていた誰かの物語の続きだった。
