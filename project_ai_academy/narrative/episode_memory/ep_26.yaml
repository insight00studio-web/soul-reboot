cliffhanger: 二人が館を出た後、館長室で年配の館長が古い来館予約ノートを閉じる。今日5月3日の欄には二件の予約——『藤堂シンジ&同伴者 1名』と、その下に『白川律子（毎年定例）』。だが14:30の枠を過ぎても白川は来なかった。館長がスマートフォンで送ったメッセージ『律子さん、今年もお見送りはなしですか』への返信が、画面に静かに表示される——『今年は行けません。N-5を、見つけてしまったから。明日、わたしの口から、あの子に全部話します。リコの分も』。同時刻、翡翠学園の校長室。机の上に並んだ二枚の写真——20年前のN-0の起動披露写真と、今朝撮影されたばかりのナギサの登校風景写真。白川律子が二枚を指で撫で、初めて声を震わせる——『ごめんなさい、リコ。……あの子は、あなたじゃ、ないわ。あなたの続きでも、ないの。それが、二十年かけてようやく、わかったの』。SYSTEMボイスが記録する——『観測者本人の自己崩壊、初観測。被検体ログ
  0件、観測者ログ 1件。明日、5月4日Day 27——記録対象、被検体から観測者へ移行する』。
