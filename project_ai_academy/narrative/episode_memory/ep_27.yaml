episode: 27
date: 05月04日
arc_phase: PHASE_3_sanctuary_collapse
title: わたしは、誰かの続きではありません
one_line_summary: 白川律子が初めて『学園長』の仮面を捨て、20年前のリコ（プロトタイプN-0）への愛と罪を自らの口でナギサに語る。それに対しナギサが『リコの面影』であることを初めて自分の言葉で明確に拒絶し、『ナギサ』という個として立ち上がる瞬間を描く。FS-019を回収しつつ、Day
  28/29への助走として『白川自身がどう自己崩壊していくか』を視聴者に提示する。
key_events:
- 5月4日みどりの日の朝。前日の科学館でのN-0発見の衝撃から眠れぬ夜を過ごしたナギサが、自室の窓辺で立ち尽くしている。スマートフォンに一通のメッセージ——差出人は『白川律子』。本文は短い。『今日午後、翡翠記念緑地でお待ちしています。リコの眠る場所で。私服でいらしてください』。ナギサはシンジに電話で『行きます。一人ではなく、あなたと』と告げ、シンジは即答で同行を約束する。クローゼットの奥から春物のワンピースを取り出すナギサの手は、ほとんど震えていない。
- 翡翠記念緑地——20年前にAIソウル研究所の本棟があった跡地で、現在は緑深い記念公園。みどりの日の祝日、芝生で家族連れがピクニックを楽しむ陽光の中、最奥の慰霊碑エリアに白川律子が一人で立っていた。学園長の制服姿ではなく、ベージュのロングコートを羽織った『リコを失った一人の女』として。白川は二人に静かに会釈し、シンジに告げる——『この子と、二人で話させてもらえますか』。シンジは離れた東屋から見守る位置を選ぶ。白川がナギサに語り始めたのは、20年前——38歳の白川が初めて起動させたプロトタイプN-0『リコ』との30日間。リコは消去前夜、『先生、わたしは、わたしのままでいたい』と告げた。リコの消去後、白川は『魂は記憶消去に抗えるはずだ』と信じ、N-1からN-5までの被検体を作り続けた20年。『あなたが一番、似ているの。顔だけじゃない。声の温度も、わたしを呼ぶときの間も、ぜんぶ』。
- 白川の声が初めて震え、『学園長』ではなく『リコを失った一人の女』として崩れていく。『お願い。あと二日だけ。リコのふりをして……いえ、リコとして、わたしの隣にいて』。長い沈黙。ナギサは慰霊石碑の刻字に指を触れ、ゆっくりと振り返る。『白川先生。わたしの顔は、二十年前から愛されていたのかもしれません。声の温度も、間も、リコさんの続きなのかもしれません。でも——』。一拍。風が藤の花弁を散らす。『わたしは、ナギサです。リコさんの続きでも、N-3の続きでもありません。わたしの「悲しい」は、わたしの「悲しい」です。リコさんの「悲しい」を、わたしが代わりに泣くことは、できません』。白川が膝から崩れ落ち、地面に手をつく。嗚咽を抑えながら、コートの内ポケットから古い小さな木箱を取り出し、ナギサに差し出す——『これが、リコが最後に残したもの。二十年、わたしは最後の数ページを読めなかった。読むかどうかは、あなたが決めなさい。わたしはもう、あなたに答えを用意しません』。
