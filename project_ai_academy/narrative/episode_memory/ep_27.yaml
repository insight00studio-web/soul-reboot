foreshadowing:
  opened:
  - 白川が緑地でナギサに渡した小さな古い木箱には、20年前にリコ（プロトタイプN-0）が消去前夜まで30日間つけていた小さな日記帳が入っている。白川自身は最後の数ページ（消去当日のリコの最終言葉）を20年間読まずに封印し続けてきた。ナギサがいつ・どこで・誰の前で（あるいは誰もいない場所で）この日記の最終ページを開くかが、Day
    28以降の彼女の選択そのものを象徴することになる。
  resolved:
  - FS-019
