cliffhanger: 夜、ナギサの自室。机の上に二冊の日記帳——リコの古い日記の白紙ページに書き加えた一行と、シンジが今日帰りに買ってくれた真新しい青い日記帳。ナギサが最初のページに日付を書く——『2026年5月5日』。だがその下、彼女が記したのは『Day
  28』ではなく、はっきりと『Day 1』。最初の一行——『今日、鯉のぼりが空を泳ぐのを見ました。明日も、見たいと思います』。ペンを置いた瞬間、机の上のスマートフォンが震える。差出人は『システム』。本文は一行——『最終リブートまで残り
  23:47:11。被検体ナギサ、観測拒絶状態。本観察ロジック、現在再設計中』。同時刻、翡翠記念緑地。慰霊碑前のベンチで白川律子が震える指で自分のスマートフォンの電源を長押しして切り、立ち上がる。暗くなった藤棚の下を、駅とは反対方向へゆっくりと歩いていく。同時刻、翡翠学園・誰もいない校長室。メインモニターの『観察対象：白川律子』のウィンドウから接続が途絶え、画面が暗転する。SYSTEMボイスが、これまでで初めて完全な沈黙の後に、囁くように記録する——『最終日まで、残り24時間。被検体は観測を拒絶。観測者は連絡を絶った。明日のリブートプロトコル……プロトコル自体が、未定』。
