cliffhanger: 翌朝、5月7日(木)。雨は完全にあがり、桜並木の若葉が朝露に光っている。通学路を歩くナギサとシンジが、いつものように歩道橋の上で並ぶ。ナギサのスマートフォンに、SYSTEMボイスからの通知は、もう来ない。代わりに机の青い日記の二ページ目には、新しい一行が書き加えられている——『2026年5月7日、Day
  2。今日も、シンジは難しく考えすぎだと言いました。明日も、たぶん同じです』。同時刻、ある駅の構内で、白川律子が一人、自首先の警察署へ向かうための切符を買っている。手には、20年間ずっとポケットに入れていたリコの古いペンが一本だけ。彼女がペンを切符と一緒にカバンに入れたとき、SYSTEMボイスは——もう、誰のスピーカーからも聞こえない。Day
  1のSYSTEMボイス『記録開始。被検体：シンジ。観測対象：ナギサ』に対する、29日越しの最後の応答として、画面いっぱいに静かなテキストだけが残る——『記録、終了。観測対象、なし。物語、これより、彼ら自身のものへ』。
