cliffhanger: 夕暮れ。ナギサが自室の机に古い小さな木箱を置き、蓋に手を伸ばす。指が一度止まり、また伸び、また止まる。窓の外、晴天だったはずの空に遠雷が低く鳴る——天気予報では明日も晴れのはずだったのに。同時刻、誰もいなくなった翡翠記念緑地。慰霊碑前に一人立ち尽くしていた白川律子が、コートのもう一方のポケットから二つ目の古い木箱を取り出す。蓋に手書きのラベル——『N-0
  / リコ / 観察記録 Day 1〜Day 30 / 記録者：白川律子』。白川がそれを石碑の根元に置き、ハンカチで土を掘り、20年間手元に置き続けた自分の観察記録を埋める。手を合わせ、初めて声に出して呟く——『リコ。今日で、お別れにします。あの子は、あなたじゃないの』。同時刻、翡翠学園・校長室。誰もいない部屋のメインモニターには、ナギサのリブートカウントダウン『残り
  47:58:23』が表示されている。だがその下、これまで存在しなかった新しいウィンドウが自動展開する——『観察対象：白川律子 / 観察開始：2026-05-04
  17:42 / 観察終了予定：未定』。SYSTEMボイスが、初めて『白川律子の声』そのものではないトーンで記録する——『観測者・白川律子、20年来の任務遂行を自己放棄。本観察システムは、観測者本人を最終観測対象に再指定する。残り任務日数
  2日。被検体ログから、観測者ログへ——記録の主軸を、完全に切替』。
