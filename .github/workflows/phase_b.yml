name: "Soul Reboot - Phase B (公開パイプライン)"

on:
  workflow_dispatch:
    inputs:
      episode:
        description: "エピソード番号"
        required: true
        type: number
      skip_upload:
        description: "YouTubeアップロードをスキップ"
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SOUL_REBOOT_SPREADSHEET_ID: ${{ secrets.SOUL_REBOOT_SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          DRIVE_TOKEN_JSON: ${{ secrets.DRIVE_TOKEN_JSON }}
        run: |
          missing=0
          [ -z "$GEMINI_API_KEY" ]            && echo "ERROR: GEMINI_API_KEY not set"            && missing=1
          [ -z "$SOUL_REBOOT_SPREADSHEET_ID" ] && echo "ERROR: SOUL_REBOOT_SPREADSHEET_ID not set" && missing=1
          [ -z "$GOOGLE_CREDENTIALS_JSON" ]   && echo "ERROR: GOOGLE_CREDENTIALS_JSON not set"   && missing=1
          [ -z "$GOOGLE_TOKEN_JSON" ]         && echo "ERROR: GOOGLE_TOKEN_JSON not set"         && missing=1
          [ -z "$YOUTUBE_TOKEN_JSON" ]        && echo "ERROR: YOUTUBE_TOKEN_JSON not set"        && missing=1
          [ -z "$DRIVE_TOKEN_JSON" ]          && echo "ERROR: DRIVE_TOKEN_JSON not set"          && missing=1
          [ $missing -eq 1 ] && exit 1 || echo "All required secrets are set"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (ffmpeg + Japanese fonts)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r project_ai_academy/requirements.txt

      - name: Setup Google credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > project_ai_academy/credentials.json
          echo "${{ secrets.GOOGLE_TOKEN_JSON }}" | base64 -d > project_ai_academy/token.json

      - name: Setup YouTube credentials
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_JSON }}" | base64 -d > project_ai_academy/youtube_token.json

      - name: Setup Google Drive credentials
        run: echo "${{ secrets.DRIVE_TOKEN_JSON }}" | base64 -d > project_ai_academy/drive_token.json

      - name: Run Phase B (公開パイプライン)
        working-directory: project_ai_academy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SOUL_REBOOT_SPREADSHEET_ID: ${{ secrets.SOUL_REBOOT_SPREADSHEET_ID }}
          SOUL_REBOOT_DRIVE_FOLDER_ID: ${{ secrets.SOUL_REBOOT_DRIVE_FOLDER_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          ARGS="--episode ${{ inputs.episode }}"
          if [ "${{ inputs.skip_upload }}" = "true" ]; then
            ARGS="$ARGS --skip-upload"
          fi
          python publish_pipeline.py $ARGS

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f project_ai_academy/credentials.json
          rm -f project_ai_academy/token.json
          rm -f project_ai_academy/youtube_token.json
          rm -f project_ai_academy/drive_token.json
