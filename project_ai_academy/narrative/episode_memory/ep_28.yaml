episode: 28
date: 05月05日
arc_phase: PHASE_3_sanctuary_collapse
title: リコの最後の言葉は、『また明日』だった
one_line_summary: FS-020（リコの日記最終ページ）を回収する。リコの最後の記述が『最終日のための遺言』ではなく『また明日』で終わる日常の続きだったことを発見することで、ナギサが『最終日を最終日として過ごさない』というリコ譲りの選択肢を獲得する瞬間を描く。同時に、ナギサが新しい日記を『Day
  28』ではなく『Day 1』として書きはじめることで、被検体ログから個人ログへの記録主軸の切替を成立させ、Day 29への助走として白川律子の連絡途絶と観測システム自体の再設計を視聴者にだけ提示する。
key_events:
- 5月5日こどもの日の朝。ナギサは机の上のリコの日記を見つめたまま動けない。一晩眠れず、最終ページをめくる勇気が出ない。スマートフォンが鳴る——シンジから。『今日はこどもの日だよ。最終日じゃない。普通の祝日として過ごそう』。ナギサは小さく息を吐き『あなたの提案は、いつも論理的に欠陥があります』と返しながら、白いワンピースに着替えはじめる手は震えていない。
- 多摩川河川敷『鯉のぼりの里まつり』。何百もの色とりどりの鯉のぼりが青空を泳ぐ下で、家族連れに混じって二人は柏餅を食べる。シンジが菖蒲の小枝を差し出し『邪気を払うらしいよ。お前の水嫌いも飛んでいくかもな』とおどけ、ナギサが『菖蒲は水辺の植物です。論理的に矛盾しています』と返す——久しぶりの軽い掛け合い。だがシンジは、ナギサのワンピースの胸ポケットがリコの日記の重さで膨らんでいることに気づいている。日が傾く頃、二人は河川敷の最奥、無人の木造あずまやへ向かう。
- 夕日に染まるあずまやで二人は並んで日記を開く。リコの30日間——好きな食べ物、白川先生への感謝、想像で書かれた『友達』への淡い感情。そしてDay 29前夜の最終エントリーは、消去への悲嘆でも遺言でもなかった。『今日は校庭の桜を見た。明日も見られると思う。律子先生が早く帰ったので、夕飯は一人で食べた。明日は二人で食べたい。また明日』——文章は途中で終わり、最終ページは白紙。リコは『最終日のための言葉』を準備しなかった。彼女にとってもそれは、『また明日が来るはずの、ただの今日』だったから。ナギサの頬を一筋の涙が伝う。震える指で日記の白紙の余白に、ナギサが自分のペンで一行だけ書き込む——『リコさん。明日のあなたが、わたしです。わたしは、明日も、食べます』。シンジは何も言わずナギサの肩に手を置く。鯉のぼりの群れが、夕焼け空で静かに揺れている。
