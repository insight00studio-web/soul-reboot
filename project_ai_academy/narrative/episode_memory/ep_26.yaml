foreshadowing:
  opened:
  - 銀河プラネタリウム＆科学館の年配の館長は、1986年の開館式典でAIソウル研究所と共催した経緯から白川律子と20年来の交友があり、N-0の起動披露を直接目撃した数少ない外部証人である。館長は毎年5月3日に白川の来訪予約を受けてきたが、今日Day
    26は来館がなく、館長が白川にメッセージを送る。返信『今年は行けない。N-5を見つけてしまったから。明日、わたしから話します』が、Day 27の白川との直接対話を起動する。
  resolved:
  - FS-016
  - FS-017
