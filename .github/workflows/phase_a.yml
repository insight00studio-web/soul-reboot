name: "Soul Reboot - Phase A (台本生成)"

on:
  schedule:
    - cron: "0 8 * * *" # UTC 08:00 = JST 17:00
  workflow_dispatch:
    inputs:
      episode:
        description: "エピソード番号（省略時はConfigの CURRENT_EPISODE を使用）"
        required: false
        type: number
      force:
        description: "既存台本を削除して再生成（--force）"
        required: false
        type: boolean
        default: false
      skip_phase_b:
        description: "Phase B の自動トリガーをスキップ"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  generate-script:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SOUL_REBOOT_SPREADSHEET_ID: ${{ secrets.SOUL_REBOOT_SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          CLAUDE_CREDENTIALS_JSON: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
        run: |
          missing=0
          [ -z "$GEMINI_API_KEY" ]            && echo "ERROR: GEMINI_API_KEY not set"            && missing=1
          [ -z "$SOUL_REBOOT_SPREADSHEET_ID" ] && echo "ERROR: SOUL_REBOOT_SPREADSHEET_ID not set" && missing=1
          [ -z "$GOOGLE_CREDENTIALS_JSON" ]   && echo "ERROR: GOOGLE_CREDENTIALS_JSON not set"   && missing=1
          [ -z "$GOOGLE_TOKEN_JSON" ]         && echo "ERROR: GOOGLE_TOKEN_JSON not set"         && missing=1
          [ -z "$CLAUDE_CREDENTIALS_JSON" ]   && echo "ERROR: CLAUDE_CREDENTIALS_JSON not set"   && missing=1
          [ $missing -eq 1 ] && exit 1 || echo "All required secrets are set"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r project_ai_academy/requirements.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Google credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 -d > project_ai_academy/credentials.json
          echo "${{ secrets.GOOGLE_TOKEN_JSON }}" | base64 -d > project_ai_academy/token.json

      - name: Setup YouTube credentials (Analytics読み取り用)
        run: echo "${{ secrets.YOUTUBE_TOKEN_JSON }}" | base64 -d > project_ai_academy/youtube_token.json

      - name: Setup Claude credentials
        run: |
          mkdir -p ~/.claude
          echo "${{ secrets.CLAUDE_CREDENTIALS_JSON }}" | base64 -d > ~/.claude/.credentials.json

      - name: Run Phase A (台本生成)
        id: phase_a
        working-directory: project_ai_academy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SOUL_REBOOT_SPREADSHEET_ID: ${{ secrets.SOUL_REBOOT_SPREADSHEET_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.episode }}" ]; then
            ARGS="$ARGS --episode ${{ inputs.episode }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python autonomous_engine.py $ARGS

      - name: Set episode output
        id: episode
        working-directory: project_ai_academy
        run: echo "episode=$(cat episode_number.txt)" >> $GITHUB_OUTPUT

      - name: Trigger Phase B (公開パイプライン)
        if: ${{ inputs.skip_phase_b != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run phase_b.yml --repo ${{ github.repository }} -f episode=${{ steps.episode.outputs.episode }}

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f project_ai_academy/credentials.json
          rm -f project_ai_academy/token.json
          rm -f project_ai_academy/youtube_token.json
          rm -f ~/.claude/.credentials.json
