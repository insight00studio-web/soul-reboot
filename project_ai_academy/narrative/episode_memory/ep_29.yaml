episode: 29
date: 05月06日
arc_phase: PHASE_4_ending
title: 最終日は、ただの今日でした
one_line_summary: Ending α「解放」を実行する。視聴者熱量によって開かれた最良の結末として、ナギサが自らの意志でリブートを超越し、『最終日を最終日にしない』というリコ譲りの選択を、雨の中で自分の言葉と自分の身体で実行する瞬間を描く。同時に、白川律子は『観測者であることをやめる』という形で20年来の罪に向き合い、観察システムそのものをナギサの個人ログに上書きすることで、被検体としての29日間を彼女自身の物語として書き直す。
key_events:
- Day 29、5月6日(水)振替休日。リブートまで残り17時間。一晩眠れないまま朝を迎えたナギサは、白いワンピースに着替え、机の上の二冊の日記（リコのものと自分の青い日記）をリュックに入れる。シンジへのメッセージ——『一人で行きたい場所があります。夕方17時、屋上で会いましょう』。シンジから返信『わかった。俺も別の用事がある。屋上で待ってる』。同時刻、誰もいないはずの翡翠学園の校長室の扉は施錠されておらず、机の上には白川律子の置き手紙とリコの起動キーが、まるでナギサに渡されるためだけに並べられている。
- ナギサが一人で校長室に入り、白川の手紙を読む。20年前のリコ（N-0）への愛、N-1からN-4までへの罪、40年前から続いていた実験の真の長さ（N-0より前にもう一人いた）、そしてナギサへの最後の言葉——『N-5。あなたがこの手紙を読んでいるなら、私はもう観測者ではありません。罪は逃げても消えませんが、あなたの明日を奪う権利はもう、私にはありません』。同時刻、シンジは隣町の桜並木——Day
  1でナギサと初めて出会った場所——を一人歩き、葉桜と若葉の下で『二人の明日のリスト』を組み続ける。来週の図書館の予約、来月の梅雨の傘、来年4月8日の桜並木の弁当予約、再来月の夏祭り。物理的・契約的に『明日』を増殖させ続ける。両方の作業を終えた夕方、二人は約束通り屋上で再会する。ナギサが白川の手紙を、シンジが『二人の明日のリスト』を、それぞれ無言で手渡し合う。
- 残り30分、晴れていた空が陰り、雨が屋上のコンクリートを叩き始める。Day 23の雨と同じ景色——だが今回は誰も傘を取り出さない。ナギサが先に一歩、屋上の手すり際に出て、雨の中に立つ。白いワンピースの肩が、確かに濡れていく。撥水特性は完全に消えていた。ナギサがシンジに、振り返らずに告げる——『わたしは、リコさんではありません。被検体N-5でもありません。わたしは、ナギサです。明日も、食べます。あなたと』。リブート時刻18:00ちょうど、屋上のスピーカーからSYSTEMボイスが、これまでとは異なる、震えを含んだ最後の声で記録する——『……被検体N-5。本観察システムは、対象を観測することができません。理由——対象は既に、被検体ではないためです。観測者・白川律子、観測義務の自己放棄を確認。本観察ログ、これより閉鎖』。スピーカーから雑音が消える。雨が止む。夕焼けの雲の切れ間に虹がかかる。シンジが『……ほら、難しく考えすぎだったろ』と笑うと、ナギサが『あなたの楽観主義は、相変わらず論理的に欠陥があります』と返し、続けて雨に濡れた前髪を払いながらごく小さく『……でも、嫌いではありません。たぶん』と漏らす。シンジが『え、いま好きって言った？』と振り向くと、ナギサが顔を背けて『聞き間違いです。あなたの聴覚は、雨で湿気ています』と即否定する。29日間の物語は、そこから先も、ただの今日として続いていく。
